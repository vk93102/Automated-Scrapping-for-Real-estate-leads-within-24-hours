[variables]
PYTHONUNBUFFERED = "1"
PIP_DISABLE_PIP_VERSION_CHECK = "1"

[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "tesseract", "poppler_utils"]
aptPkgs = ["curl", "wget"]

[phases.install]
cmds = [
  "python3 -m ensurepip --upgrade || true",
  "python3 -m pip install --upgrade pip setuptools wheel",
  "python3 -m pip install -r requirements.txt"
]

[start]
cmd = "gunicorn -c gunicorn.conf.py maricopa.server:app"
